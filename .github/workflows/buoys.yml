name: buoys
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min; NDBC updates ~hourly-ish
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: buoys
  cancel-in-progress: false
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch buoys
        run: node scripts/fetch_buoys.mjs
      - name: Commit if changed
        run: |
          git config user.name "capecast-buoy-bot"
          git config user.email "actions@users.noreply.github.com"
          git add buoys.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "buoys: $(date -u +%H:%MZ)"
          git pull --rebase origin main
          git push
